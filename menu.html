<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <title>Catlaxnyan - Menu</title>
    <style>
        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #menu-container {
            position: relative;
            width: 800px;
            height: 600px;
        }

        #menu {
            display: block;
            width: 100%;
            height: 100%;
            background: black;
        }
    </style>
</head>

<body>
    <div id="menu-container">
        <canvas id="menu" width="800" height="600"></canvas>
    </div>

    <script type="module" src="./menu.js"></script>
</body>

</html>
