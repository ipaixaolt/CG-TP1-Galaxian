<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxian</title>

    <style>
       html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: white;
}

        
        #game-container {
    position: relative;
    width: 800px;
    height: 600px;
    margin: 40px auto; 
    
}

        #game {
            display: block;
            width: 100%;
            height: 100%;
            background: pink;
        }

        
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            display: flex;
            justify-content: center;
            align-items: center;

            font-size: 48px;
            font-weight: bold;
            color: white;
        }

        .hidden {
            display: none;
        }

        .gameover {
            background: rgba(255, 0, 0, 0.6);
        }

        .victory {
            background: rgba(0, 150, 0, 0.6);
        }
    </style>
</head>

<body>

    <div id="game-container">
        <canvas id="game" width="800" height="600"></canvas>

        <!-- overlay de estado do jogo -->
        <div id="overlay" class="hidden">
            <div id="message"></div>
        </div>
    </div>

    <script type="module" src="./main.js"></script>

</body>
</html>
